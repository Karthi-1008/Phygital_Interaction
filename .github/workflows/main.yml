name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: KinderJoyDetector   # ← THIS is the fix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.4-bin.zip -d /opt/gradle
          /opt/gradle/gradle-8.4/bin/gradle wrapper

      - name: Build Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KinderJoyDetector-APK
          path: KinderJoyDetector/app/build/outputs/apk/release/*.apk
          retention-days: 90
